<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 72" width="100%" height="100%">
  <!-- Gold gradients for premium 3D polygonal shading -->
  <defs>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe853" />
      <stop offset="100%" stop-color="#ffcc00" />
    </linearGradient>
    <linearGradient id="goldMedium" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00" />
      <stop offset="100%" stop-color="#e09900" />
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cc9900" />
      <stop offset="100%" stop-color="#805b00" />
    </linearGradient>
  </defs>

  <!-- Left pixel details (digital theme) -->
  <g fill="#ffcc00" opacity="0.95">
    <rect x="2" y="24" width="3" height="3" />
    <rect x="6" y="29" width="3" height="3" fill="#ffffff" />
    <rect x="10" y="20" width="3" height="3" />
  </g>

  <!-- Main text: "Un" -->
  <text x="14" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="-0.5px">Un</text>

  <!-- High-end 3D Polygonal Owl Icon (replacing 'w') -->
  <g transform="translate(62, 4)">
    <!-- Right horn & cheek (shadow side - medium/dark gold) -->
    <path d="M40,5 L28,24 L48,16 Z" fill="url(#goldMedium)" />
    <path d="M40,5 L48,16 L44,28 L38,32 Z" fill="url(#goldDark)" />
    
    <!-- Left horn & cheek (highlight side - bright gold) -->
    <path d="M8,5 L0,16 L20,24 Z" fill="url(#goldLight)" />
    <path d="M8,5 L10,28 L0,16 Z" fill="url(#goldLight)" />
    
    <!-- Face Center Forehead / Brow -->
    <path d="M24,16 L10,28 L24,38 L38,28 Z" fill="url(#goldLight)" />
    <path d="M24,16 L38,28 L28,24 Z" fill="url(#goldMedium)" />

    <!-- Cheeks (Bottom Left & Right) -->
    <path d="M0,16 L10,28 L8,42 L0,32 Z" fill="url(#goldLight)" />
    <path d="M48,16 L48,32 L40,42 L38,28 Z" fill="url(#goldDark)" />

    <!-- Chin (Highlight and Shadow sides) -->
    <path d="M8,42 L24,42 L24,56 Z" fill="url(#goldLight)" />
    <path d="M40,42 L24,56 L24,42 Z" fill="url(#goldMedium)" />

    <!-- Eyebrows (V-shape structure) -->
    <path d="M10,28 L24,37 L38,28 L30,30 L24,37 L18,30 Z" fill="url(#goldLight)" />

    <!-- Owl Eyes (Angry/Focused geometric structure) -->
    <!-- Left Eye -->
    <path d="M13,27 C17,23 21,28 21,28 C21,28 17,32 13,27 Z" fill="#111217" stroke="#ffffff" stroke-width="1" />
    <circle cx="17" cy="27.5" r="1.2" fill="url(#goldLight)" />
    
    <!-- Right Eye -->
    <path d="M35,27 C31,23 27,28 27,28 C27,28 31,32 35,27 Z" fill="#111217" stroke="#ffffff" stroke-width="1" />
    <circle cx="31" cy="27.5" r="1.2" fill="url(#goldLight)" />

    <!-- Beak -->
    <path d="M22,37 L26,37 L24,42 Z" fill="url(#goldMedium)" />

    <!-- Digital pixels rising from the right horn -->
    <rect x="42" y="-4" width="3" height="3" fill="#ffcc00" />
    <rect x="46" y="1" width="3" height="3" fill="#ffffff" opacity="0.8" />
    <rect x="39" y="6" width="3" height="3" fill="#ffcc00" />
  </g>

  <!-- Main text: "ize" -->
  <text x="114" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="-0.5px">ize</text>

  <!-- Subtitle: "Stays" with elegant Serif style & integrated house outline -->
  <g transform="translate(50, 44)">
    <!-- Elegant Serif Stays Text -->
    <text x="2" y="22" font-family="Georgia, Cambria, 'Times New Roman', serif" font-weight="bold" font-size="20" fill="#ffffff">Stays</text>
    
    <!-- House icon integrated seamlessly over the letters 'a' and 'y' -->
    <path d="M38,12 L44,6 L50,12 L50,22 L38,22 Z" fill="none" stroke="url(#goldLight)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M41,22 L41,18 L47,18 L47,22" fill="none" stroke="url(#goldLight)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Pixels on the right of Stays -->
    <rect x="58" y="13" width="2.5" height="2.5" fill="#ffcc00" />
    <rect x="62" y="17" width="2.5" height="2.5" fill="#ffffff" opacity="0.7" />
  </g>
</svg>
