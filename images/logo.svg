<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215 75" width="100%" height="100%">
  <!-- Gold gradient matching the project theme -->
  <defs>
    <linearGradient id="goldTheme" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600" />
      <stop offset="100%" stop-color="#ff9900" />
    </linearGradient>
  </defs>

  <!-- Left pixel details (digital theme) -->
  <g fill="url(#goldTheme)" opacity="0.9">
    <rect x="3" y="25" width="3.5" height="3.5" />
    <rect x="7.5" y="30.5" width="3.5" height="3.5" fill="#ffffff" />
    <rect x="12" y="20.5" width="3.5" height="3.5" />
  </g>

  <!-- Main text: "Un" -->
  <text x="18" y="46" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="38" fill="#ffffff" letter-spacing="-0.5px">Un</text>

  <!-- Beautiful smooth Owl Head Icon (replacing 'w') with true transparent cutouts -->
  <!-- Scaled to fit perfectly between 'Un' and 'ize' -->
  <g transform="translate(70, 2) scale(0.66)">
    <!-- Main head outline with eye socket cutouts (using fill-rule="evenodd" for 100% transparent eyes) -->
    <!-- Incorporating the signature digital pillar/tower on the right horn -->
    <path fill-rule="evenodd" d="
      M 50,24 
      Q 34,22 18,12 
      C 12,28 10,48 10,48 
      L 22,72 
      L 32,58 
      L 50,80 
      L 68,58 
      L 78,72 
      L 90,48 
      C 90,48 90,32 90,12 
      L 90,4 
      L 84,4 
      L 84,12 
      L 78,12 
      L 78,20 
      L 72,20 
      Q 61,22 50,24 Z 
      M 34,28 
      A 10,10 0 1,0 34,48 
      A 10,10 0 1,0 34,28 
      M 66,28 
      A 10,10 0 1,0 66,48 
      A 10,10 0 1,0 66,28" 
      fill="url(#goldTheme)" />

    <!-- Angry Eyebrow curves (Gold) -->
    <path d="M 12,20 Q 31,34 50,40 Q 69,34 88,20 L 88,27 Q 69,37 50,44 Q 31,37 12,27 Z" fill="url(#goldTheme)"/>

    <!-- Glowing eyes inside the sockets -->
    <!-- Left Eye (White outline with center pupil) -->
    <circle cx="34" cy="38" r="8" fill="none" stroke="#ffffff" stroke-width="2" />
    <circle cx="34" cy="38" r="2" fill="#ffffff"/>

    <!-- Right Eye (White outline with center pupil) -->
    <circle cx="66" cy="38" r="8" fill="none" stroke="#ffffff" stroke-width="2" />
    <circle cx="66" cy="38" r="2" fill="#ffffff"/>

    <!-- Owl Beak (Diamond shape) -->
    <polygon points="46,38 54,38 50,48" fill="url(#goldTheme)"/>

    <!-- Digital pixels rising from the right horn tower -->
    <rect x="94" y="-8" width="4" height="4" fill="url(#goldTheme)" />
    <rect x="100" y="0" width="4" height="4" fill="#ffffff" opacity="0.8" />
    <rect x="91" y="6" width="4" height="4" fill="url(#goldTheme)" />
  </g>

  <!-- Main text: "ize" -->
  <text x="138" y="46" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="38" fill="#ffffff" letter-spacing="-0.5px">ize</text>

  <!-- Subtitle: "Stays" with elegant Serif style & integrated house outline -->
  <g transform="translate(56, 46)">
    <!-- Elegant Serif Stays Text -->
    <text x="2" y="22" font-family="Georgia, Cambria, 'Times New Roman', serif" font-weight="bold" font-size="22" fill="#ffffff">Stays</text>
    
    <!-- House icon integrated seamlessly over the letters 'a' and 'y' -->
    <path d="M40,12 L47,5 L54,12 L54,22 L40,22 Z" fill="none" stroke="url(#goldTheme)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M44,22 L44,17 L50,17 L50,22" fill="none" stroke="url(#goldTheme)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Pixels on the right of Stays -->
    <rect x="62" y="13" width="2.5" height="2.5" fill="url(#goldTheme)" />
    <rect x="67" y="19" width="2.5" height="2.5" fill="#ffffff" opacity="0.7" />
  </g>

  <!-- Right/top floating pixels -->
  <rect x="194" y="24" width="3.5" height="3.5" fill="url(#goldTheme)"/>
  <rect x="199" y="30" width="3.5" height="3.5" fill="#ffffff" opacity="0.8"/>
</svg>
