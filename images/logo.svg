<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 65" width="100%" height="100%">
  <defs>
    <!-- Warm gold gradient matching the premium theme -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600" />
      <stop offset="100%" stop-color="#ffb300" />
    </linearGradient>
  </defs>

  <!-- Left pixel details in gold -->
  <rect x="5" y="16" width="3" height="3" fill="#ffb300" opacity="0.8"/>
  <rect x="9" y="21" width="3" height="3" fill="#ffffff" opacity="0.6"/>

  <!-- Main Word: Unwize -->
  <!-- 'Un' in high-contrast crisp white -->
  <text x="14" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="28" fill="#ffffff" letter-spacing="-0.5px">Un</text>

  <!-- 'w' represented by a clean, modern geometric Owl Head with true transparency cutout -->
  <g transform="translate(54, 11)">
    <!-- Outer shape with inner face cut out (using fill-rule="evenodd" for 100% transparency) -->
    <path fill-rule="evenodd" d="M2,9 L14,1 L26,9 L23,23 L14,30 L5,23 Z M4.5,10 L14,3.5 L23.5,10 L21,21.5 L14,27.5 L7,21.5 Z" fill="url(#goldGrad)"/>
    
    <!-- Eyebrows and beak -->
    <path d="M7,10 L14,16.5 L21,10 L18,11.5 L14,16.5 L10,11.5 Z" fill="url(#goldGrad)"/>
    <path d="M13,16.5 L15,16.5 L14,21 Z" fill="url(#goldGrad)"/>
    
    <!-- Large, expressive eyes -->
    <circle cx="10" cy="13.5" r="3" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <circle cx="10" cy="13.5" r="1.2" fill="url(#goldGrad)"/>
    <circle cx="18" cy="13.5" r="3" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <circle cx="18" cy="13.5" r="1.2" fill="url(#goldGrad)"/>
  </g>

  <!-- 'ize' in high-contrast crisp white -->
  <text x="85" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="28" fill="#ffffff" letter-spacing="-0.5px">ize</text>

  <!-- Subtitle: STAYS -->
  <g transform="translate(0, 3)">
    <!-- Tiny gold house outline before STAYS -->
    <path d="M48,46 L48,41 L52,38 L56,41 L56,46 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M51,46 L51,43 L53,43 L53,46" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
    
    <!-- STAYS text aligned and tracked out -->
    <text x="61" y="47" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="10.5" fill="#94a3b8" letter-spacing="4px">STAYS</text>
  </g>

  <!-- Right/top floating pixels -->
  <rect x="134" y="12" width="3" height="3" fill="#ffb300"/>
  <rect x="139" y="17" width="3" height="3" fill="#ffffff" opacity="0.7"/>
  <rect x="131" y="21" width="3" height="3" fill="#ffb300" opacity="0.5"/>
</svg>
