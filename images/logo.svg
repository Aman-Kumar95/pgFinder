<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 72" width="100%" height="100%">
  <!-- Gold gradient matching the project theme -->
  <defs>
    <linearGradient id="goldTheme" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600" />
      <stop offset="100%" stop-color="#ff9900" />
    </linearGradient>
  </defs>

  <!-- Left pixel details (digital theme) -->
  <g fill="url(#goldTheme)" opacity="0.9">
    <rect x="2" y="24" width="3" height="3" />
    <rect x="6" y="29" width="3" height="3" fill="#ffffff" />
    <rect x="10" y="20" width="3" height="3" />
  </g>

  <!-- Main text: "Un" -->
  <text x="14" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="-0.5px">Un</text>

  <!-- Beautiful smooth Owl Head Icon (replacing 'w') with true transparent cutouts -->
  <g transform="translate(62, 5)">
    <!-- Main head outline with eye socket cutouts (using fill-rule="evenodd" for 100% transparent eyes) -->
    <path fill-rule="evenodd" d="M 24,18 Q 12,15 2,7 Q 9,23 9,36 L 19,53 L 24,46 L 24,58 L 24,46 L 29,53 L 39,36 Q 39,23 46,7 Q 36,15 24,18 Z M 15.5,19.5 A 8,8 0 1,0 15.5,35.5 A 8,8 0 1,0 15.5,19.5 M 32.5,19.5 A 8,8 0 1,0 32.5,35.5 A 8,8 0 1,0 32.5,19.5" fill="url(#goldTheme)" />

    <!-- Angry Eyebrow curves (Gold) -->
    <path d="M 3,11 Q 14,20 24,27 Q 34,20 45,11 L 43,15 Q 34,23 24,29 Q 14,23 5,15 Z" fill="url(#goldTheme)"/>

    <!-- Glowing eyes inside the sockets -->
    <!-- Left Eye -->
    <circle cx="15.5" cy="27.5" r="5.5" fill="none" stroke="url(#goldTheme)" stroke-width="1.8"/>
    <circle cx="15.5" cy="27.5" r="1.5" fill="#ffffff"/>

    <!-- Right Eye -->
    <circle cx="32.5" cy="27.5" r="5.5" fill="none" stroke="url(#goldTheme)" stroke-width="1.8"/>
    <circle cx="32.5" cy="27.5" r="1.5" fill="#ffffff"/>

    <!-- Owl Beak -->
    <path d="M 22.5,29.5 L 25.5,29.5 L 24,35 Z" fill="url(#goldTheme)"/>

    <!-- Digital pixels rising from the right horn -->
    <rect x="40" y="-4" width="3" height="3" fill="url(#goldTheme)" />
    <rect x="44" y="1" width="3" height="3" fill="#ffffff" opacity="0.8" />
    <rect x="37" y="6" width="3" height="3" fill="url(#goldTheme)" />
  </g>

  <!-- Main text: "ize" -->
  <text x="114" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="-0.5px">ize</text>

  <!-- Subtitle: "Stays" with elegant Serif style & integrated house outline -->
  <g transform="translate(50, 44)">
    <!-- Elegant Serif Stays Text -->
    <text x="2" y="22" font-family="Georgia, Cambria, 'Times New Roman', serif" font-weight="bold" font-size="20" fill="#ffffff">Stays</text>
    
    <!-- House icon integrated seamlessly over the letters 'a' and 'y' -->
    <path d="M38,12 L44,6 L50,12 L50,22 L38,22 Z" fill="none" stroke="url(#goldTheme)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M41,22 L41,18 L47,18 L47,22" fill="none" stroke="url(#goldTheme)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Pixels on the right of Stays -->
    <rect x="58" y="13" width="2.5" height="2.5" fill="url(#goldTheme)" />
    <rect x="62" y="17" width="2.5" height="2.5" fill="#ffffff" opacity="0.7" />
  </g>
</svg>
